name: heartbeat scheduler

# Reliable scheduler that does NOT depend on GitHub's flaky `schedule:` cadence.
# Each run is ONE short tick — a catch-up dispatch pass, a ~2 min wait, then it
# re-spawns itself via workflow_dispatch (which fires reliably via GITHUB_TOKEN).
# That forms a continuous ~2.5-min chain. Short runs (vs one long loop) mean
# every tick's log is readable, so the run is observable and debuggable.
# Public repo = unlimited Actions minutes, so the continuous chain is $0.
#
# Liveness/redundancy:
#  - re-spawn (with `if: always()`) keeps the chain going even if a tick errors;
#  - push-to-main + `schedule` (~every 15 min) bootstrap/recover the chain;
#  - concurrency cancel-in-progress => exactly one tick at a time, self-healing.
on:
  workflow_dispatch:
    inputs:
      dispatch_dry_run:
        description: "Dispatch run_notebook in dry-run mode (no real client contact)"
        type: boolean
        default: false
  schedule:
    - cron: '8,23,38,53 * * * *'   # backup bootstrap/recovery (off-peak minutes)
  push:
    branches: [main]              # bootstrap the chain immediately on any main update

permissions:
  actions: write      # dispatch run_notebook + re-spawn self via GITHUB_TOKEN
  contents: read

concurrency:
  group: heartbeat
  cancel-in-progress: true   # exactly one tick chain; newest wins

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet psycopg2-binary croniter

      - name: Catch-up dispatch pass
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          MAX_CATCHUP_MINUTES: '120'
          DISPATCH_DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dispatch_dry_run) && '1' || '' }}
        run: python scripts/schedule_dispatch.py

      - name: Wait ~2 min, then re-spawn the next tick
        if: always()   # keep the chain alive even if the dispatch pass errored
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
        run: |
          sleep 120
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GH_REPO/actions/workflows/heartbeat.yml/dispatches" \
            -d "{\"ref\":\"$GH_REF\"}"
