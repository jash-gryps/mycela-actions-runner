name: cron scheduler

# GitHub-native scheduler: every 5 minutes it reads the notebook schedules from
# Neon and dispatches run_notebook.yml for any that are due (evaluated in
# America/New_York — schedules are US Eastern). Replaces the cron-job.org →
# dashboard trigger path; no external scheduler or dashboard required.
#
# TIMELINESS: GitHub-hosted cron is best-effort — it can start a few minutes late
# and, under heavy load, occasionally skip a tick. Jobs therefore fire within
# ~0–5 min (typically) of their scheduled Eastern time, not to the exact second.
# If exact-minute punctuality is required, the cron-job.org path is the better
# tool (see docs) — this trades a little precision for zero external dependencies.
#
# NOTE: `schedule:` only runs on the repository's DEFAULT branch, so this must be
# on `main` to fire automatically. `workflow_dispatch` lets you run it on demand.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      plan_only:
        description: "Log which notebooks are due without dispatching"
        type: boolean
        default: false
      dispatch_dry_run:
        description: "Dispatch run_notebook in dry-run mode (no real client contact)"
        type: boolean
        default: false

permissions:
  actions: write      # required to dispatch run_notebook.yml with GITHUB_TOKEN
  contents: read

concurrency:
  group: cron-scheduler   # never let two ticks overlap
  cancel-in-progress: false

jobs:
  dispatch-due:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet psycopg2-binary croniter

      - name: Dispatch due notebooks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          WINDOW_MINUTES: '5'
          PLAN_ONLY: ${{ (github.event_name == 'workflow_dispatch' && inputs.plan_only) && '1' || '' }}
          DISPATCH_DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dispatch_dry_run) && '1' || '' }}
        run: python scripts/schedule_dispatch.py
