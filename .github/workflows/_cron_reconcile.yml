name: (controlled) cron-job.org reconcile

# Temporary harness: reconcile cron-job.org jobs to config with correct
# schedule + America/New_York timezone + prod URL, and drop duplicates. Runs
# DRY-RUN (read-only) first so we can see the live state and the planned
# changes before applying. Circuit-breaker in the script prevents runaway under
# rate limiting. Remove once healthy.
on:
  push:
    branches: [claude/zealous-rubin-vh4bkr]
    paths: ['.github/workflows/_cron_reconcile.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    name: cron-job.org reconcile (APPLY)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet psycopg2-binary pyyaml requests

      - name: Generate notebooks.yml from Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DASHBOARD_URL: https://gryps-automation.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python scripts/gen_notebooks_yml.py /tmp/notebooks.yml

      - name: Reconcile (APPLY — enforce schedule + America/New_York + enabled)
        env:
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
        run: python scripts/reconcile_cronjobs.py --config /tmp/notebooks.yml

      - name: Diagnose final state (read-only)
        if: always()
        env:
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
        run: python scripts/diagnose_cronjobs.py
