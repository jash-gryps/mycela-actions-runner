name: Migrate cron-job.org to mycela format (one-time)

# One-time migration: matches existing legacy cron-job.org jobs to notebooks
# by URL (?id=notebook_id) or file-name slug, then renames titles to
# 'mycela:{id}' and updates trigger URLs to use the current CRON_SECRET.
# After this runs successfully, sync_cronjobs.yml works normally.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print changes without making API calls)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read

jobs:
  migrate:
    name: Migrate legacy → mycela
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet psycopg2-binary pyyaml requests

      - name: Generate notebooks.yml from Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || 'https://gryps-automation.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python scripts/gen_notebooks_yml.py /tmp/notebooks.yml

      - name: Migrate cron-job.org jobs
        env:
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || 'https://gryps-automation.vercel.app' }}
        run: |
          FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAG="--dry-run"; fi
          python scripts/migrate_cronjobs.py --config /tmp/notebooks.yml $FLAG
