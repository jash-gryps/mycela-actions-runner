name: Run Notebook
run-name: "pipeline run #${{ github.run_number }}${{ inputs.dry_run && ' (dry run)' || '' }}"

# ── How to trigger this workflow ──────────────────────────────────────────────
# Pass opaque identifiers only. The real client URL is resolved from a secret.
# The alias (codename) appears in all logs and notifications — never the real name.
#
# Example dispatch:
#   notebook_id: "harbor-cip"
#   alias: "harbor"
#   gryps_url_secret: "GRYPS_URL_HARBOR"   ← name of the GitHub Secret
#   notebook_path: "/Agent/CIP/pipeline.ipynb"
#   dry_run: true   ← placeholder env; validates deps/browsers/wiring, contacts no real service
#
# All runs use free GitHub-hosted ubuntu-latest runners (public-repo model — no VM).
# Real client identity never appears here: the real URL is resolved from a secret and
# immediately ::add-mask::ed; only the alias appears in run-names and logs.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      notebook_id:
        description: "Notebook ID from notebooks.yml (e.g. harbor-cip)"
        required: true
        type: string
      alias:
        description: "Client codename for logs and notifications (e.g. harbor)"
        required: true
        type: string
      gryps_url_secret:
        description: "Name of the GitHub Secret holding the real Gryps URL (e.g. GRYPS_URL_HARBOR)"
        required: true
        type: string
      notebook_folder:
        description: "Folder containing the notebook in the file browser (may be empty)"
        required: false
        default: ""
        type: string
      notebook_file:
        description: "Notebook .ipynb filename to open (e.g. pipeline.ipynb)"
        required: true
        type: string
      gryps_instance:
        description: "Gryps instance name for the open-notebook button (default Gryps-Analytics)"
        required: false
        default: "Gryps-Analytics"
        type: string
      max_execution_minutes:
        description: "Max minutes to wait for notebook execution (default: 30)"
        required: false
        default: "30"
        type: string
      dry_run:
        description: "Dry run — validate runner/deps/wiring without contacting any real service"
        required: false
        default: false
        type: boolean
      pipeline_name:
        description: "Human-readable pipeline name shown in the dashboard (e.g. Harbor CIP)"
        required: false
        default: ""
        type: string
      created_by:
        description: "Username of the person who owns this pipeline"
        required: false
        default: ""
        type: string

permissions:
  contents: read

# One run per notebook at a time — queue, never cancel in-progress
concurrency:
  group: notebook-${{ inputs.notebook_id }}
  cancel-in-progress: false

env:
  NOTEBOOK_ID: ${{ inputs.notebook_id }}
  TENANT_ALIAS: ${{ inputs.alias }}
  NOTEBOOK_FOLDER: ${{ inputs.notebook_folder }}
  NOTEBOOK_FILE: ${{ inputs.notebook_file }}
  GRYPS_INSTANCE: ${{ inputs.gryps_instance }}
  MAX_EXECUTION_MINUTES: ${{ inputs.max_execution_minutes }}
  DRY_RUN: ${{ inputs.dry_run }}
  GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:

  # ── Stage 1: Login ──────────────────────────────────────────────────────────
  stage-1-login:
    name: "1 · Login"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: notebooks/requirements.txt

      - name: Install dependencies
        run: pip install -r notebooks/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Resolve and mask Gryps URL
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            # Dry run: placeholder URL, no secret needed, nothing real to mask
            echo "GRYPS_URL=https://example.gryps.io" >> $GITHUB_ENV
          else
            # Resolve the real URL from the named secret, then immediately mask it.
            # After this step, the real URL appears as *** in all subsequent logs.
            REAL_URL="${{ secrets[inputs.gryps_url_secret] }}"
            echo "::add-mask::$REAL_URL"
            echo "::add-mask::${{ inputs.notebook_folder }}"
            echo "::add-mask::${{ inputs.notebook_file }}"
            echo "GRYPS_URL=$REAL_URL" >> $GITHUB_ENV
          fi

      - name: Stage 1 — Login
        env:
          PIPELINE_STAGE: "1"
          GRYPS_USERNAME: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_USERNAME }}
          GRYPS_PASSWORD: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m notebooks.main

      - name: Upload check report
        if: always()
        env:
          PIPELINE_STAGE: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m notebooks.report

      # No public upload-artifact: artifacts/ holds client-derived output (check
      # reports, failure screenshots of the live tenant). report.py (above) routes
      # them to the PRIVATE GDrive run folder instead. See docs/SECURITY.md.

  # ── Stage 2: JupyterLab ─────────────────────────────────────────────────────
  stage-2-jupyterlab:
    name: "2 · JupyterLab"
    needs: stage-1-login
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip, cache-dependency-path: notebooks/requirements.txt }
      - run: pip install -r notebooks/requirements.txt
      - run: playwright install chromium --with-deps
      - name: Resolve and mask Gryps URL
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "GRYPS_URL=https://example.gryps.io" >> $GITHUB_ENV
          else
            REAL_URL="${{ secrets[inputs.gryps_url_secret] }}"
            echo "::add-mask::$REAL_URL"
            echo "::add-mask::${{ inputs.notebook_folder }}"
            echo "::add-mask::${{ inputs.notebook_file }}"
            echo "GRYPS_URL=$REAL_URL" >> $GITHUB_ENV
          fi
      - name: Stage 2 — JupyterLab
        env:
          PIPELINE_STAGE: "2"
          GRYPS_USERNAME: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_USERNAME }}
          GRYPS_PASSWORD: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m notebooks.main
      - name: Upload check report
        if: always()
        env:
          PIPELINE_STAGE: "2"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m notebooks.report
      # No public upload-artifact — report.py routes artifacts to private GDrive.

  # ── Stage 3: Open Notebook ──────────────────────────────────────────────────
  stage-3-open-notebook:
    name: "3 · Open Notebook"
    needs: stage-2-jupyterlab
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip, cache-dependency-path: notebooks/requirements.txt }
      - run: pip install -r notebooks/requirements.txt
      - run: playwright install chromium --with-deps
      - name: Resolve and mask Gryps URL
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "GRYPS_URL=https://example.gryps.io" >> $GITHUB_ENV
          else
            REAL_URL="${{ secrets[inputs.gryps_url_secret] }}"
            echo "::add-mask::$REAL_URL"
            echo "::add-mask::${{ inputs.notebook_folder }}"
            echo "::add-mask::${{ inputs.notebook_file }}"
            echo "GRYPS_URL=$REAL_URL" >> $GITHUB_ENV
          fi
      - name: Stage 3 — Open Notebook
        env:
          PIPELINE_STAGE: "3"
          GRYPS_USERNAME: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_USERNAME }}
          GRYPS_PASSWORD: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m notebooks.main
      - name: Upload check report
        if: always()
        env:
          PIPELINE_STAGE: "3"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m notebooks.report
      # No public upload-artifact — report.py routes artifacts to private GDrive.

  # ── Stage 4: Execute ─────────────────────────────────────────────────────────
  stage-4-execute:
    name: "4 · Execute"
    needs: stage-3-open-notebook
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip, cache-dependency-path: notebooks/requirements.txt }
      - run: pip install -r notebooks/requirements.txt
      - run: playwright install chromium --with-deps
      - name: Resolve and mask Gryps URL
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "GRYPS_URL=https://example.gryps.io" >> $GITHUB_ENV
          else
            REAL_URL="${{ secrets[inputs.gryps_url_secret] }}"
            echo "::add-mask::$REAL_URL"
            echo "::add-mask::${{ inputs.notebook_folder }}"
            echo "::add-mask::${{ inputs.notebook_file }}"
            echo "GRYPS_URL=$REAL_URL" >> $GITHUB_ENV
          fi
      - name: Stage 4 — Execute Notebook
        env:
          PIPELINE_STAGE: "4"
          GRYPS_USERNAME: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_USERNAME }}
          GRYPS_PASSWORD: ${{ inputs.dry_run == true && 'dry-run-placeholder' || secrets.GRYPS_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m notebooks.main
      - name: Upload check report
        if: always()
        env:
          PIPELINE_STAGE: "4"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m notebooks.report
      # No public upload-artifact — report.py routes artifacts to private GDrive.

  # ── Finalize: always runs ────────────────────────────────────────────────────
  finalize:
    name: "5 · Finalize"
    needs: [stage-1-login, stage-2-jupyterlab, stage-3-open-notebook, stage-4-execute]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip, cache-dependency-path: notebooks/requirements.txt }
      - run: pip install -r notebooks/requirements.txt

      # No download-artifact: finalize reads each stage's check report back from the
      # PRIVATE GDrive run folder (uploaded per-stage by report.py). See docs/SECURITY.md.

      - name: Finalize and archive
        env:
          JOB_1_RESULT: ${{ needs.stage-1-login.result }}
          JOB_2_RESULT: ${{ needs.stage-2-jupyterlab.result }}
          JOB_3_RESULT: ${{ needs.stage-3-open-notebook.result }}
          JOB_4_RESULT: ${{ needs.stage-4-execute.result }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m notebooks.finalize
