name: (controlled) cron-job.org migrate run

# Temporary, controlled harness. Migrate already completed successfully (all 21
# notebook jobs repointed to prod as mycela:*). This iteration runs the FIXED
# sync (minimal PATCH — no more 500) and then a read-only diagnostic snapshot so
# we can confirm final state (schedules, leftover jobs). Remove once healthy.
on:
  push:
    branches: [claude/zealous-rubin-vh4bkr]
    paths: ['.github/workflows/_cron_migrate_run.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repair:
    name: cron-job.org sync + diagnose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet psycopg2-binary pyyaml requests

      - name: Generate notebooks.yml from Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DASHBOARD_URL: https://gryps-automation.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: python scripts/gen_notebooks_yml.py /tmp/notebooks.yml

      - name: Sync schedules from Neon (APPLY, fixed minimal PATCH)
        env:
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
        run: python notebooks/setup_cronjobs.py --config /tmp/notebooks.yml

      - name: Diagnose cron-job.org state (read-only)
        if: always()
        env:
          CRONJOB_API_KEY: ${{ secrets.CRONJOB_API_KEY }}
        run: python scripts/diagnose_cronjobs.py
